name: shadocformer
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - cudatoolkit=11.8

  # Core
  - pytorch=2.0.1=py3.10_cuda11.8_cudnn8_0
  - torchvision=0.15.2=py3.10_cu118
  - numpy=1.26.4
  - scipy>=1.10
  - scikit-image>=0.21

  # Data
  - opencv>=4.8
  - pillow>=10.0

  # Visualization
  - matplotlib>=3.7

  # Utilities
  - tqdm>=4.65

  - pip:
    - torchmetrics==1.9.0
    - albumentations==2.0.8
    - timm==1.0.27
    - einops==0.8.2
    - pytorch-msssim==1.0.0
    - easyocr==1.7.2
    - accelerate==0.17.1
